name: Auto Deploy

# Kích hoạt workflow mỗi khi có thao tác push lên nhánh main
on:
  push:
    branches:
      - main  # Nếu nhánh chính của bạn tên là master, hãy sửa thành master

jobs:
  deploy:
    runs-on: self-hosted # Chỉ định chạy trên Runner bạn vừa cài đặt ở server

    steps:
      - name: Execute Deploy Script
        run: |
          cd /opt/apps/GDB_ubuntu
          
          # 1. Tải thông tin các commit mới nhất từ GitHub về (nhưng chưa gộp vào code hiện tại)
          git fetch origin main
          
          # 2. So sánh sự khác biệt giữa code hiện tại trên server (HEAD) và code mới trên GitHub (origin/main)
          # Nếu có file trong thư mục docker/ thay đổi thì tự động kích hoạt rebuild compiler images
          if git diff --name-only HEAD origin/main | grep -q "^docker/"; then
            echo "Phát hiện thay đổi trong thư mục docker/. Sẽ build lại base images."
            export REBUILD_RUNNER_IMAGES=1
          else
            export REBUILD_RUNNER_IMAGES=0
          fi
          
          # 3. Yêu cầu restart lại các service (frontend, api, runner)
          export RESTART_APP=1
          
          # 4. Chạy script deploy để tự động git pull và docker compose up --build
          bash bin/pull-latest.sh