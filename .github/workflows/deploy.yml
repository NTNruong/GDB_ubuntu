name: Auto Deploy

on:
  push:
    branches:
      - main

# --- THÊM: Tránh chạy song song các job deploy ---
concurrency:
  group: deploy-main
  cancel-in-progress: false

jobs:
  deploy:
    # Chỉ chạy trên repo gốc — fork (khi repo public) sẽ không chạy job này trên self-hosted runner.
    if: github.repository == 'NTNruong/GDB_ubuntu'
    runs-on: self-hosted
    # --- THÊM: Giới hạn thời gian chạy tối đa ---
    timeout-minutes: 30

    steps:
      - name: Execute Deploy Script
        run: |
          cd /opt/apps/GDB_ubuntu
          git fetch origin main
          
          if git diff --name-only HEAD origin/main | grep -q "^docker/"; then
            echo "Detected changes in docker/ directory. Setting REBUILD_RUNNER_IMAGES=1"
            export REBUILD_RUNNER_IMAGES=1
          else
            export REBUILD_RUNNER_IMAGES=0
          fi
          
          export RESTART_APP=1
          bash bin/pull-latest.sh