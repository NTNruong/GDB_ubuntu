name: Auto Deploy

on:
  push:
    branches:
      - main

# --- THÊM: Tránh chạy song song các job deploy ---
concurrency:
  group: deploy-main
  cancel-in-progress: false

jobs:
  deploy:
    # Chỉ chạy trên repo gốc — fork (khi repo public) sẽ không chạy job này trên self-hosted runner.
    if: github.repository == 'NTNruong/GDB_ubuntu'
    runs-on: self-hosted
    # --- THÊM: Giới hạn thời gian chạy tối đa ---
    timeout-minutes: 30

    steps:
      - name: Execute Deploy Script
        run: |
          cd /opt/apps/GDB_ubuntu
          git fetch origin main

          # Always rebuild runner images: Docker layer cache no-ops unchanged ones, and
          # this removes the git-diff/HEAD-advance race that let the app advertise a
          # capability before its runner image was rebuilt (ISSUE-059). A build failure
          # makes `set -e` in pull-latest.sh abort before the app services come up.
          export REBUILD_RUNNER_IMAGES=1
          export RESTART_APP=1
          bash bin/pull-latest.sh