services:
  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
    ports:
      - "8080:80"
    depends_on:
      - api
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      PORT: "4000"
      HOST: "0.0.0.0"
      RUNNER_BASE_URL: "http://runner:4001"
      RUNNER_WS_URL: "ws://runner:4001"
      # Per-user file explorer (Phase 2). Root dir holding one folder per user +
      # users.json. SESSION_SECRET signs the auth cookie — set a stable value in
      # the deploy .env (openssl rand -hex 32) or sessions reset on every restart.
      USER_HOMES_ROOT: "/user-homes"
      SESSION_SECRET: "${SESSION_SECRET:-}"
      # Mark the session cookie Secure when served over HTTPS (public Funnel).
      # Set SESSION_COOKIE_SECURE=1 in the deploy .env (ISSUE-054). Unset → "" → off.
      SESSION_COOKIE_SECURE: "${SESSION_COOKIE_SECURE:-}"
      # AI learning assistant (Phase 3). LLAMA_BASE_URL points at the host
      # llama.cpp server (Vulkan/RX580). Under ROOTLESS Docker the host-loopback
      # path is disabled, so host.docker.internal is unreachable — set
      # LLAMA_BASE_URL to the host's real address (e.g. the tailnet name
      # http://<host>.ts.net:8000) in the deploy .env. LLAMA_API_KEY must match
      # llama-server's --api-key so the model is not callable without the token
      # even when its port is reachable on the tailnet. GEMINI_API_KEY is an
      # optional server-wide fallback; each user can also save their own key,
      # encrypted at rest with AI_KEY_SECRET (defaults to SESSION_SECRET when
      # unset). Set AI_ENABLED=0 to hide the local model. AI_DATA_ROOT stores
      # per-user chat threads + keys.
      AI_ENABLED: "${AI_ENABLED:-1}"
      LLAMA_BASE_URL: "${LLAMA_BASE_URL:-http://host.docker.internal:8000}"
      LLAMA_API_KEY: "${LLAMA_API_KEY:-}"
      GEMINI_API_KEY: "${GEMINI_API_KEY:-}"
      AI_KEY_SECRET: "${AI_KEY_SECRET:-}"
      AI_DATA_ROOT: "/ai-data"
      # RAG doc knowledge base (Phase A). The index is BUILT ON THE HOST by the
      # rag:ingest CLI (bin/rag-ingest.sh) and this container only READS it via the
      # read-only /rag-data bind below. RAG_EMBEDDING_MODEL / RAG_EMBED_DIM MUST
      # match what ingest used or the store rejects the vectors. Full runbook:
      # docs/RAG.md.
      RAG_DATA_ROOT: "/rag-data"
      RAG_EMBEDDING_MODEL: "${RAG_EMBEDDING_MODEL:-gemini-embedding-2}"
      RAG_EMBED_DIM: "${RAG_EMBED_DIM:-768}"
    extra_hosts:
      # Lets the api container reach a llama.cpp server running on the host.
      - "host.docker.internal:host-gateway"
    volumes:
      # Host bind-source of the per-user homes. In production (rootless Docker)
      # point USER_HOMES_HOST_ROOT at a dir owned by the service user (ISSUE-044),
      # e.g. /home/gdbrunner/gdb-user-homes. Must match USER_HOMES_ROOT above.
      - ${USER_HOMES_HOST_ROOT:-/tmp/gdb-ubuntu-user-homes}:/user-homes
      # Per-user AI chat threads + encrypted API keys (separate from user homes
      # so they never appear in the file explorer). Must match AI_DATA_ROOT.
      - ${AI_DATA_HOST_ROOT:-/tmp/gdb-ubuntu-ai-data}:/ai-data
      # RAG index dir, host-built by rag:ingest. Read-only here (only the chat
      # route reads it). Point RAG_DATA_HOST_ROOT at the host index dir, e.g.
      # /opt/gdb-rag/index. Must match RAG_DATA_ROOT above.
      - ${RAG_DATA_HOST_ROOT:-/tmp/gdb-ubuntu-rag-data}:/rag-data:ro
    expose:
      - "4000"
    depends_on:
      - runner
    restart: unless-stopped

  runner:
    build:
      context: .
      dockerfile: apps/runner/Dockerfile
    environment:
      PORT: "4001"
      HOST: "0.0.0.0"
      CPP_IMAGE: "internal-code-runner-cpp:0.1.0"
      PYTHON_IMAGE: "internal-code-runner-python:0.1.0"
      JAVASCRIPT_IMAGE: "internal-code-runner-javascript:0.1.0"
      JAVA_IMAGE: "internal-code-runner-java:0.1.0"
      GO_IMAGE: "internal-code-runner-go:0.1.0"
      RUST_IMAGE: "internal-code-runner-rust:0.1.0"
      MAX_CONCURRENT_JOBS: "6"
      RUN_TIMEOUT_MS: "15000"
      DEBUG_MAX_MS: "900000"
      DEBUG_IDLE_MS: "300000"
      DEBUG_ENGINE: "dap"
      DEBUG_VERBOSE: "0"
      # Java debug cold-starts jdt.ls (CPU-bound on workspace import); the tight run limits
      # make the first breakpoint take ~20s. Give the Java debug container a larger budget.
      # Lower these if a small host gets starved under concurrent debug sessions.
      DEBUG_JAVA_NANO_CPUS: "${DEBUG_JAVA_NANO_CPUS:-4000000000}"
      DEBUG_JAVA_MEMORY_BYTES: "${DEBUG_JAVA_MEMORY_BYTES:-2147483648}"
      WORKSPACE_CONTAINER_ROOT: "/runner-workspaces"
      # Must equal the host bind-source below (the child containers' bind paths are
      # resolved by the daemon on the host). Override in production to a path owned
      # by the rootless service user when /tmp is not owned by it (ISSUE-044).
      WORKSPACE_HOST_ROOT: "${WORKSPACE_HOST_ROOT:-/tmp/gdb-ubuntu-runner-workspaces}"
    volumes:
      # Host bind-source of the Docker socket. Default = root daemon (dev / Docker
      # Desktop). In production set DOCKER_SOCK_SOURCE to the rootless socket
      # (/run/user/<uid>/docker.sock) so a compromised runner is capped to an
      # unprivileged user, not host root (ISSUE-044). The in-container path stays
      # /var/run/docker.sock, so DOCKER_SOCKET_PATH does not change.
      - ${DOCKER_SOCK_SOURCE:-/var/run/docker.sock}:/var/run/docker.sock
      - ${WORKSPACE_HOST_ROOT:-/tmp/gdb-ubuntu-runner-workspaces}:/runner-workspaces
    expose:
      - "4001"
    restart: unless-stopped

  runner-cpp-image:
    image: internal-code-runner-cpp:0.1.0
    build:
      context: docker/runner-cpp
    profiles:
      - runner-images

  runner-python-image:
    image: internal-code-runner-python:0.1.0
    build:
      context: docker/runner-python
    profiles:
      - runner-images

  runner-javascript-image:
    image: internal-code-runner-javascript:0.1.0
    build:
      context: docker/runner-javascript
    profiles:
      - runner-images

  runner-java-image:
    image: internal-code-runner-java:0.1.0
    build:
      context: docker/runner-java
    profiles:
      - runner-images

  runner-go-image:
    image: internal-code-runner-go:0.1.0
    build:
      context: docker/runner-go
    profiles:
      - runner-images

  runner-rust-image:
    image: internal-code-runner-rust:0.1.0
    build:
      context: docker/runner-rust
    profiles:
      - runner-images
