server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Keep in sync with MAX_REQUEST_BODY_BYTES (packages/shared) and the Fastify
  # bodyLimit in api/runner, so the proxy does not 413 a payload the schema allows.
  client_max_body_size 8m;

  location /api/ {
    # Resolve `api` lazily via Docker's embedded DNS so nginx starts even when the
    # api container isn't up yet (ISSUE-046), and re-resolves after api recreate.
    resolver 127.0.0.11 valid=10s ipv6=off;
    set $api_upstream api;
    proxy_pass http://$api_upstream:4000$request_uri;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_buffering off;
    proxy_cache off;
    proxy_read_timeout 1h;
    proxy_send_timeout 1h;
  }


  location / {
    try_files $uri $uri/ /index.html;
  }
}
